services:
  app:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: bookit-app
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./infrastructure/docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - bookit
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: bookit-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      - ./infrastructure/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - bookit
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: bookit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookit
      POSTGRES_USER: bookit
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bookit

  redis:
    image: redis:7-alpine
    container_name: bookit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bookit

  mailpit:
    image: axllent/mailpit
    container_name: bookit-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - bookit

volumes:
  postgres_data:
  redis_data:

networks:
  bookit:
    driver: bridge
